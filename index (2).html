<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@caiodev999</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.12);
            --primary-accent: #3b82f6;
            --secondary-accent: #8b5cf6;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-stack);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .avatar-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 16px;
        }

        .avatar img {
            width: 100%;
            border-radius: 50%;
        }

        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
        }

        .icon-box {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .icon-box svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .copy-btn {
            font-size: 12px;
            margin-left: 10px;
            cursor: pointer;
            color: #3b82f6;
        }
    </style>
</head>
<body>

<div class="mesh-gradient"></div>

<div class="container">
    <header class="profile">
        <div class="avatar-wrapper">
            <div class="avatar">
                <img src= "imagem/python.png">
            </div>
        </div>
        <h1>@caiodev999</h1>
        <p>Criador de Conteúdo</p>
    </header>

    <main class="links-wrapper">

        <!-- YouTube -->
        <a href="https://www.youtube.com/@caiodev999" target="_blank" class="link-item">
            <div class="icon-box">
                <!-- Ícone YouTube -->
                <svg viewBox="0 0 24 24"><path d="M19.615 3.184C21.403 3.6 22.8 5.004 23.214 6.8c.45 1.93.45 5.953.45 5.953s0 4.022-.45 5.953c-.414 1.796-1.81 3.2-3.6 3.616-1.93.45-9.614.45-9.614.45s-7.683 0-9.613-.45c-1.79-.416-3.186-1.82-3.6-3.616C0 16.775 0 12.753 0 12.753s0-4.023.45-5.953c.414-1.796 1.81-3.2 3.6-3.616C2.317 2.734 10 2.734 10 2.734s7.684 0 9.615.45zM9.545 15.568l6.182-3.568-6.182-3.568v7.136z"/></svg>
            </div>
            <span>YouTube</span>
            <span class="copy-btn" onclick="copyLink(event,'https://www.youtube.com/@caiodev999')">copiar</span>
        </a>

        <!-- Kwai -->
        <a href="https://www.kwai.com/@caiodev999" target="_blank" class="link-item">
            <div class="icon-box">
                <!-- Ícone genérico -->
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            </div>
            <span>Kwai</span>
            <span class="copy-btn" onclick="copyLink(event,'https://www.kwai.com/@caiodev999')">copiar</span>
        </a>

        <!-- Instagram -->
        <a href="https://www.instagram.com/caiodev999" target="_blank" class="link-item">
            <div class="icon-box">
                <!-- Ícone Instagram -->
                <svg viewBox="0 0 24 24"><path d="M7 2C4.24 2 2 4.24 2 7v10c0 2.76 2.24 5 5 5h10c2.76 0 5-2.24 5-5V7c0-2.76-2.24-5-5-5H7zm5 5a5 5 0 110 10 5 5 0 010-10zm6.5-.75a1.25 1.25 0 110 2.5 1.25 1.25 0 010-2.5z"/></svg>
            </div>
            <span>Instagram</span>
            <span class="copy-btn" onclick="copyLink(event,'https://www.instagram.com/caiodev999')">copiar</span>
        </a>

    </main>
</div>

<script>
function copyLink(event, link) {
    event.preventDefault();
    navigator.clipboard.writeText(link);
    alert("Link copiado!");
}
</script>

</body>
</html>
